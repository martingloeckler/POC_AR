<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR.js Marker Test (Standalone)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { overflow: hidden; width: 100%; height: 100%; }
    #debug-overlay {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 9999;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      border-radius: 6px;
      max-width: 200px;
      pointer-events: none;
    }
  </style>
</head>
<body style="margin: 0; overflow: hidden;">

  <div id="debug-overlay">
    Marker: <span id="marker-status">NICHT ERKANNT</span><br>
    Events: <span id="marker-events">0</span>
  </div>

  <a-scene
    arjs="sourceType: webcam;
          sourceWidth: 1280;
          sourceHeight: 960;
          displayWidth: 1280;
          displayHeight: 960;
          debugUIEnabled: true;
          trackingMethod: best;"
    renderer="antialias: true; alpha: true;"
    vr-mode-ui="enabled: false"
  >
    <a-marker preset="hiro"
      id="hiro-marker"
      raycaster="objects: .clickable"
      emitevents="true"
      smooth="true"
      smoothCount="5"
      smoothTolerance="0.01"
      smoothThreshold="2"
    >
      <a-box position="0 0.5 0" material="color: green;" scale="1 1 1"></a-box>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    // Debug: log marker found/lost events
    var eventCount = 0;
    window.addEventListener('load', function() {
      // Wait for a-scene to be ready
      var scene = document.querySelector('a-scene');
      if (scene) {
        scene.addEventListener('loaded', function() {
          console.log('[DEBUG] A-Scene loaded');
        });
      }

      var marker = document.querySelector('#hiro-marker');
      if (marker) {
        marker.addEventListener('markerFound', function() {
          eventCount++;
          console.log('[DEBUG] MARKER FOUND! Total events: ' + eventCount);
          document.getElementById('marker-status').textContent = 'ERKANNT ✅';
          document.getElementById('marker-status').style.color = '#0f0';
          document.getElementById('marker-events').textContent = eventCount;
        });
        marker.addEventListener('markerLost', function() {
          console.log('[DEBUG] Marker lost');
          document.getElementById('marker-status').textContent = 'VERLOREN ❌';
          document.getElementById('marker-status').style.color = '#f00';
        });
        console.log('[DEBUG] Marker event listeners registered');
      } else {
        console.log('[DEBUG] ERROR: #hiro-marker not found in DOM');
      }
    });
  </script>

</body>
</html>
